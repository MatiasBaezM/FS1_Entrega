# application.properties - ms-bodega
# Configuración del Sistema de Almacén y Órdenes de Picking para BookPoint Chile
# Arquitecto de Software: Antigravity

# Puerto del Servidor local
server.port=8089

# Nombre del Microservicio
spring.application.name=ms-bodega

# Configuración de Base de Datos MySQL (Esquema: bookpoint_bodega)
spring.datasource.url=jdbc:mysql://localhost:3306/bookpoint_bodega?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=

# Configuración JPA e Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Registro y Descubrimiento Eureka (Desactivado temporalmente para pruebas locales)
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.enabled=false

# Habilitar logging del nivel INFO para trazabilidad de estados de picking
logging.level.cl.bookpointchile.bodega=INFO
